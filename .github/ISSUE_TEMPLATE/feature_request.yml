name: Feature Request
description: Suggest a new feature or improvement
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: Describe the problem or limitation you are running into.
      placeholder: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you would like to see.
      placeholder: How should this feature work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you have considered.
      placeholder: What other approaches did you think about?
    validations:
      required: false
