name: Release (Electron)

# Triggered by pushing a version tag: git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - 'v*'

jobs:
  electron-macos:
    name: macOS DMG (arm64, signed + notarized)
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck, lint, unit tests
        run: |
          npm run typecheck
          npm run lint
          npm test

      # ── Import Developer ID certificate into a temporary keychain ─────────────
      # A temp keychain contains exactly one cert so codesign never hits the
      # "ambiguous" error that occurs when the login keychain has duplicate names.
      # This mirrors the Bulletin Generator CI signing pattern exactly.
      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          # Developer ID G2 intermediate CA — required for notarization chain
          curl -sL https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer \
            -o "$RUNNER_TEMP/DeveloperIDG2CA.cer"
          security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" -k "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Prepare notarization API key
        env:
          APPLE_NOTARY_KEY_CONTENT: ${{ secrets.APPLE_NOTARY_KEY_CONTENT }}
        run: |
          KEY_PATH="$RUNNER_TEMP/notary-key.p8"
          echo "$APPLE_NOTARY_KEY_CONTENT" > "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      # ── Build + sign + notarize DMG via electron-builder ─────────────────────
      # electron-builder finds the cert via CSC_KEYCHAIN (single cert = no ambiguity).
      # APPLE_API_KEY* triggers automatic notarization + stapling via electron-builder.
      - name: Build macOS DMG
        env:
          APPLE_API_KEY_ID:     ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_API_ISSUER:     ${{ secrets.APPLE_NOTARY_KEY_ISSUER }}
        run: npm run electron:dist

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-macos-arm64
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/*.zip
            dist/*.zip.blockmap
          if-no-files-found: error

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: electron-macos
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          files: release-assets/*
          generate_release_notes: true
